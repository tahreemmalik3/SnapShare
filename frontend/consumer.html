<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnapShare — Discover</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;background:#0d0d14;color:#e8e8f0;min-height:100vh;}

  nav{
    display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
    padding:1rem 2rem;background:#13131f;
    border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;top:0;z-index:100;
  }
  .logo{font-size:1.4rem;font-weight:800;
    background:linear-gradient(135deg,#e94560,#f5a623);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .search{
    flex:1;min-width:180px;max-width:480px;
    background:#0d0d14;border:1px solid rgba(255,255,255,.1);
    border-radius:30px;padding:.55rem 1.2rem;
    color:#e8e8f0;font-size:.9rem;outline:none;transition:border-color .2s;
  }
  .search:focus{border-color:#e94560;}
  .nav-right{display:flex;align-items:center;gap:.75rem;margin-left:auto;}
  .badge{background:#13131f;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:.75rem;padding:.25rem .75rem;border-radius:20px;}
  .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);border-radius:8px;padding:.4rem .9rem;cursor:pointer;font-size:.85rem;transition:all .2s;}
  .btn-logout:hover{border-color:#e94560;color:#e94560;}

  .filters{display:flex;gap:.5rem;flex-wrap:wrap;padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,.06);}
  .filter{
    background:transparent;border:1px solid rgba(255,255,255,.1);
    color:rgba(255,255,255,.4);border-radius:20px;padding:.35rem .9rem;
    font-size:.82rem;cursor:pointer;transition:all .2s;
  }
  .filter.active,.filter:hover{border-color:#e94560;color:#e94560;}

  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.25rem;padding:1.5rem 2rem;max-width:1400px;margin:0 auto;}

  .card{background:#13131f;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;}
  .card:hover{transform:translateY(-4px);border-color:rgba(233,69,96,.35);}
  .card img{width:100%;height:210px;object-fit:cover;display:block;}
  .card-body{padding:1rem;}
  .card-title{font-size:.95rem;font-weight:600;margin-bottom:.25rem;}
  .card-meta{font-size:.78rem;color:rgba(255,255,255,.38);margin-bottom:.65rem;}
  .card-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.65rem;}
  .tag{background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c084fc;border-radius:20px;padding:.12rem .55rem;font-size:.72rem;}
  .card-foot{display:flex;align-items:center;justify-content:space-between;}
  .stars{display:flex;gap:.15rem;}
  .star{font-size:1rem;cursor:pointer;color:rgba(255,255,255,.15);transition:color .15s;}
  .star.on{color:#f5a623;}
  .star:hover{color:#f5a623;}
  .cmt-btn{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);border-radius:8px;padding:.28rem .7rem;font-size:.78rem;cursor:pointer;transition:all .2s;}
  .cmt-btn:hover{border-color:#7c3aed;color:#c084fc;}

  /* MODAL */
  .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .modal{background:#13131f;border:1px solid rgba(255,255,255,.1);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .25s;}
  .overlay.open .modal{transform:scale(1);}
  .modal-img{width:100%;max-height:380px;object-fit:cover;}
  .modal-body{padding:1.5rem;}
  .modal-title{font-size:1.5rem;font-weight:700;margin-bottom:.4rem;}
  .modal-caption{color:rgba(255,255,255,.5);margin-bottom:.75rem;line-height:1.6;font-size:.9rem;}
  .chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
  .chip{background:#1e1e30;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.25rem .7rem;font-size:.78rem;color:rgba(255,255,255,.5);}

  .section-label{font-size:.72rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;margin:1.25rem 0 .6rem;}

  .sentiment{display:inline-flex;align-items:center;gap:.4rem;border-radius:8px;padding:.3rem .8rem;font-size:.82rem;margin-bottom:.5rem;}
  .sentiment.positive{background:rgba(107,203,119,.12);border:1px solid rgba(107,203,119,.3);color:#6bcb77;}
  .sentiment.negative{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.3);color:#e94560;}
  .sentiment.neutral{background:#1e1e30;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);}

  .comments-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:.75rem;}
  .comment{background:#1a1a2e;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.7rem .9rem;}
  .comment-author{font-size:.75rem;color:#e94560;font-weight:600;margin-bottom:.2rem;}
  .comment-text{font-size:.86rem;line-height:1.5;}
  .comment-sentiment{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:.2rem;}

  .add-comment{display:flex;gap:.5rem;}
  .cmt-input{flex:1;background:#0d0d14;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem .9rem;color:#e8e8f0;font-family:'Segoe UI',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
  .cmt-input:focus{border-color:#7c3aed;}
  .send{background:#7c3aed;border:none;border-radius:8px;padding:.6rem 1.1rem;color:#fff;cursor:pointer;font-size:.85rem;transition:opacity .2s;white-space:nowrap;}
  .send:hover{opacity:.85;}

  .close-btn{position:sticky;top:.75rem;float:right;margin:.75rem;background:#1e1e30;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
  .close-btn:hover{border-color:#e94560;color:#e94560;}

  .empty{text-align:center;padding:4rem 2rem;color:rgba(255,255,255,.3);}
  .empty .icon{font-size:3rem;margin-bottom:.75rem;opacity:.4;}
</style>
</head>
<body>

<nav>
  <div class="logo">📸 SnapShare</div>
  <input class="search" type="text" placeholder="Search photos, places, people..." oninput="handleSearch(this.value)"/>
  <div class="nav-right">
    <span class="badge">Consumer</span>
    <span style="font-size:.82rem;color:rgba(255,255,255,.35)" id="nav-user"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="filters">
  <button class="filter active" onclick="setFilter('all',this)">🌐 All</button>
  <button class="filter" onclick="setFilter('top',this)">⭐ Top Rated</button>
  <button class="filter" onclick="setFilter('recent',this)">🕐 Recent</button>
  <button class="filter" onclick="setFilter('discussed',this)">💬 Most Discussed</button>
</div>

<div class="gallery" id="gallery">
  <div class="empty"><div class="icon">🔍</div><p>Loading photos…</p></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal(null,true)">✕</button>
    <img class="modal-img" id="m-img" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-title" id="m-title"></div>
      <div class="modal-caption" id="m-caption"></div>
      <div class="chips" id="m-chips"></div>
      <div id="m-tags"></div>
      <div class="section-label">Comment Sentiment</div>
      <div id="m-sentiment"></div>
      <div class="section-label">Comments</div>
      <div class="comments-list" id="m-comments"></div>
      <div class="add-comment">
        <input class="cmt-input" type="text" id="new-cmt" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')submitComment()"/>
        <button class="send" onclick="submitComment()">Post</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API='https://snapshare-api-tehreem-ahaabvbabqeyccbv.italynorth-01.azurewebsites.net';
  const token=localStorage.getItem('token');
  if(!token) window.location.href='index.html';
  document.getElementById('nav-user').textContent=localStorage.getItem('email')||'';

  let all=[], activeFilter='all', searchTimer=null, currentId=null;
  function logout(){ localStorage.clear(); window.location.href='index.html'; }

  function setFilter(f,btn){
    activeFilter=f;
    document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function handleSearch(q){ clearTimeout(searchTimer); searchTimer=setTimeout(()=>load(q),350); }

  async function load(q=''){
    const gallery=document.getElementById('gallery');
    gallery.innerHTML='<div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>';
    try{
      const url=q?`${API}/photos/?search=${encodeURIComponent(q)}`:`${API}/photos/`;
      const res=await fetch(url,{headers:{'Authorization':`Bearer ${token}`}});
      all=await res.json();
      render();
    }catch(e){
      gallery.innerHTML='<div class="empty"><div class="icon">⚠️</div><p>Could not load photos.</p></div>';
    }
  }

  function render(){
    const gallery=document.getElementById('gallery');
    let photos=[...all];
    if(activeFilter==='top')      photos.sort((a,b)=>(b.avg_rating||0)-(a.avg_rating||0));
    else if(activeFilter==='recent')    photos.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    else if(activeFilter==='discussed') photos.sort((a,b)=>(b.comment_count||0)-(a.comment_count||0));

    if(!photos.length){
      gallery.innerHTML='<div class="empty"><div class="icon">🔍</div><p>No photos found.</p></div>';
      return;
    }
    gallery.innerHTML=photos.map(p=>{
      const tags=(p.tags||[]).slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('');
      const stars=[1,2,3,4,5].map(s=>`<span class="star ${s<=(p.user_rating||Math.round(p.avg_rating||0))?'on':''}" onclick="event.stopPropagation();rate('${p.id}',${s},this)">★</span>`).join('');
      return `
        <div class="card" onclick="openModal('${p.id}')">
          <img src="${p.image_url}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x210?text=No+Image'"/>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-meta">📍 ${p.location||'Unknown'} · ${new Date(p.created_at).toLocaleDateString()}</div>
            <div class="card-tags">${tags}</div>
            <div class="card-foot">
              <div class="stars">${stars}</div>
              <button class="cmt-btn">💬 ${p.comment_count||0}</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function rate(photoId,score,el){
    try{
      await fetch(`${API}/ratings/`,{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body:JSON.stringify({photo_id:photoId,rating:score})
      });
      const stars=el.parentElement.querySelectorAll('.star');
      stars.forEach((s,i)=>s.classList.toggle('on',i<score));
      const p=all.find(x=>x.id===photoId);
      if(p) p.user_rating=score;
    }catch(e){ console.error('Rating failed'); }
  }

  async function openModal(id){
    currentId=id;
    const overlay=document.getElementById('overlay');
    overlay.classList.add('open');
    const p=all.find(x=>x.id===id);
    if(p){
      document.getElementById('m-img').src=p.image_url;
      document.getElementById('m-title').textContent=p.title;
      document.getElementById('m-caption').textContent=p.caption||'';
      document.getElementById('m-chips').innerHTML=[
        p.location?`<span class="chip">📍 ${p.location}</span>`:'',
        p.people  ?`<span class="chip">👥 ${p.people}</span>`:'',
        `<span class="chip">⭐ ${(p.avg_rating||0).toFixed(1)} avg</span>`,
      ].filter(Boolean).join('');
      document.getElementById('m-tags').innerHTML=(p.tags||[]).map(t=>`<span class="tag">${t}</span> `).join('');
    }
    document.getElementById('m-comments').innerHTML='<div style="color:rgba(255,255,255,.3);font-size:.85rem">Loading comments…</div>';
    try{
      const res=await fetch(`${API}/comments/?photo_id=${id}`,{headers:{'Authorization':`Bearer ${token}`}});
      const data=await res.json();
      renderComments(data.comments||[]);
      renderSentiment(data.overall_sentiment||'neutral');
    }catch(e){
      document.getElementById('m-comments').innerHTML='<div style="color:rgba(255,255,255,.3)">Could not load comments.</div>';
    }
  }

  function renderSentiment(s){
    const icons={positive:'😊 Mostly positive',negative:'😔 Mostly negative',neutral:'😐 Mixed / neutral'};
    document.getElementById('m-sentiment').innerHTML=`<div class="sentiment ${s}">${icons[s]||s}</div>`;
  }

  function renderComments(comments){
    const list=document.getElementById('m-comments');
    if(!comments.length){
      list.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:.85rem">No comments yet. Be first!</div>';
      return;
    }
    list.innerHTML=comments.map(c=>`
      <div class="comment">
        <div class="comment-author">${c.user_email||'Anonymous'}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-sentiment">${c.sentiment==='positive'?'😊':c.sentiment==='negative'?'😔':''} ${c.sentiment}</div>
      </div>`).join('');
  }

  async function submitComment(){
    const input=document.getElementById('new-cmt');
    const text=input.value.trim();
    if(!text||!currentId) return;
    input.value='';
    try{
      await fetch(`${API}/comments/`,{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body:JSON.stringify({photo_id:currentId,text})
      });
      const res=await fetch(`${API}/comments/?photo_id=${currentId}`,{headers:{'Authorization':`Bearer ${token}`}});
      const data=await res.json();
      renderComments(data.comments||[]);
      renderSentiment(data.overall_sentiment||'neutral');
      const p=all.find(x=>x.id===currentId);
      if(p){ p.comment_count=(p.comment_count||0)+1; render(); }
    }catch(e){ console.error('Comment failed'); }
  }

  function closeModal(e,force=false){
    if(!force&&e&&e.target!==document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('open');
    currentId=null;
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(null,true); });

  load();
</script>
</body>
</html>
