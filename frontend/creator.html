<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnapShare — Creator Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d0d14; color: #e8e8f0; min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; background: #13131f;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.4rem; font-weight: 800;
    background: linear-gradient(135deg, #e94560, #f5a623);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .badge {
    background: linear-gradient(135deg,#7c3aed,#a855f7);
    color:#fff; font-size:.72rem; font-weight:600;
    padding:.25rem .75rem; border-radius:20px; letter-spacing:.5px;
  }
  .nav-right { display:flex; align-items:center; gap:1rem; }
  .user-info { font-size:.85rem; color:rgba(255,255,255,.5); }
  .btn-logout {
    background:transparent; border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.5); border-radius:8px; padding:.4rem .9rem;
    cursor:pointer; font-size:.85rem; transition:all .2s;
  }
  .btn-logout:hover { border-color:#e94560; color:#e94560; }

  .layout { display:grid; grid-template-columns:360px 1fr; gap:1.5rem; padding:1.5rem; max-width:1300px; margin:0 auto; }

  /* UPLOAD PANEL */
  .panel { background:#13131f; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:1.5rem; height:fit-content; }
  .panel-title { font-size:1.1rem; font-weight:700; margin-bottom:1.25rem; color:#fff; }

  .dropzone {
    border:2px dashed rgba(255,255,255,.15); border-radius:12px;
    padding:2rem 1rem; text-align:center; cursor:pointer;
    transition:all .2s; margin-bottom:1.25rem; position:relative;
  }
  .dropzone:hover,.dropzone.over { border-color:#e94560; background:rgba(233,69,96,.05); }
  .dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
  .dropzone .icon { font-size:2.5rem; margin-bottom:.5rem; }
  .dropzone p { color:rgba(255,255,255,.45); font-size:.85rem; }
  .dropzone strong { color:#e94560; }

  #preview { width:100%; border-radius:10px; margin-bottom:1.25rem; display:none; max-height:200px; object-fit:cover; }

  .field { margin-bottom:.9rem; }
  .field label { display:block; font-size:.75rem; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.8px; margin-bottom:.35rem; }
  .field input, .field textarea {
    width:100%; background:#0d0d14; border:1px solid rgba(255,255,255,.1);
    border-radius:8px; padding:.65rem .9rem; color:#e8e8f0;
    font-family:'Segoe UI',sans-serif; font-size:.9rem; outline:none;
    transition:border-color .2s; resize:vertical;
  }
  .field input:focus,.field textarea:focus { border-color:#e94560; }

  .tags-row { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.4rem; }
  .tag {
    background:rgba(124,58,237,.2); border:1px solid rgba(124,58,237,.4);
    color:#c084fc; border-radius:20px; padding:.15rem .6rem; font-size:.75rem;
  }
  .tag-note { font-size:.8rem; color:rgba(255,255,255,.3); font-style:italic; }

  .btn-upload {
    width:100%; padding:.85rem; border:none; border-radius:10px;
    background:linear-gradient(135deg,#e94560,#f5a623);
    color:#fff; font-size:.95rem; font-weight:600; cursor:pointer;
    transition:opacity .2s; margin-top:.5rem;
  }
  .btn-upload:hover { opacity:.85; }
  .btn-upload:disabled { opacity:.35; cursor:not-allowed; }

  /* MY PHOTOS */
  .photos-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
  .photos-header h2 { font-size:1.1rem; font-weight:700; color:#fff; }
  .count { background:#13131f; border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:.2rem .75rem; font-size:.8rem; color:rgba(255,255,255,.4); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:1rem; }
  .photo-card { background:#13131f; border:1px solid rgba(255,255,255,.08); border-radius:14px; overflow:hidden; transition:transform .2s,border-color .2s; }
  .photo-card:hover { transform:translateY(-3px); border-color:rgba(233,69,96,.4); }
  .photo-card img { width:100%; height:160px; object-fit:cover; display:block; }
  .card-info { padding:.8rem; }
  .card-title { font-size:.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:.25rem; }
  .card-meta { font-size:.75rem; color:rgba(255,255,255,.4); }
  .card-stats { display:flex; gap:.75rem; margin-top:.4rem; font-size:.75rem; color:rgba(255,255,255,.4); }

  .empty { text-align:center; padding:3rem; color:rgba(255,255,255,.3); }
  .empty .icon { font-size:3rem; margin-bottom:.75rem; opacity:.4; }

  .toast {
    position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
    background:#13131f; border:1px solid rgba(255,255,255,.1);
    border-radius:10px; padding:.8rem 1.25rem; font-size:.88rem;
    transform:translateY(60px); opacity:0; transition:all .3s; pointer-events:none;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.ok  { border-color:rgba(107,203,119,.4); color:#6bcb77; }
  .toast.err { border-color:rgba(233,69,96,.4);   color:#e94560; }

  @media(max-width:768px){ .layout{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav>
  <div class="logo">📸 SnapShare</div>
  <div class="nav-right">
    <span class="badge">✦ Creator</span>
    <span class="user-info" id="nav-user"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="layout">

  <!-- LEFT: UPLOAD -->
  <div class="panel">
    <div class="panel-title">📤 Upload Photo</div>

    <div class="dropzone" id="dz">
      <input type="file" accept="image/*" onchange="pickFile(this)"/>
      <div class="icon">🖼️</div>
      <p><strong>Click to upload</strong> or drag &amp; drop</p>
      <p>JPG, PNG, WEBP · Max 10MB</p>
    </div>

    <img id="preview" alt="preview"/>

    <div class="field"><label>Title *</label><input type="text" id="f-title" placeholder="Name this moment..."/></div>
    <div class="field"><label>Caption</label><textarea id="f-caption" rows="2" placeholder="Tell the story..."></textarea></div>
    <div class="field"><label>📍 Location</label><input type="text" id="f-location" placeholder="City, Country"/></div>
    <div class="field"><label>👥 People Present</label><input type="text" id="f-people" placeholder="Names, comma separated"/></div>

    <div class="field">
      <label>🤖 AI Tags (auto-generated)</label>
      <div class="tags-row" id="ai-tags"><span class="tag-note">Upload an image to generate tags…</span></div>
    </div>

    <button class="btn-upload" id="uploadBtn" onclick="upload()" disabled>Publish Photo</button>
  </div>

  <!-- RIGHT: MY PHOTOS -->
  <div>
    <div class="photos-header">
      <h2>My Photos</h2>
      <span class="count" id="count">0 photos</span>
    </div>
    <div class="grid" id="grid"><div class="empty"><div class="icon">📷</div><p>Loading...</p></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://snapshare-api-tehreem.azurewebsites.net';
  const token = localStorage.getItem('token');
  if (!token || localStorage.getItem('role') !== 'creator') window.location.href = 'index.html';
  document.getElementById('nav-user').textContent = localStorage.getItem('email') || '';

  let selectedFile = null;
  let aiTags = [];

  function logout(){ localStorage.clear(); window.location.href='index.html'; }

  function toast(msg, type='ok'){
    const t = document.getElementById('toast');
    t.textContent=msg; t.className=`toast show ${type}`;
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  // Drag & Drop
  const dz = document.getElementById('dz');
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()=>dz.classList.remove('over'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('over');
    const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) processFile(f); });

  function pickFile(input){ if(input.files[0]) processFile(input.files[0]); }

  function processFile(file){
    selectedFile=file;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=document.getElementById('preview');
      img.src=e.target.result; img.style.display='block';
      document.getElementById('uploadBtn').disabled=false;
    };
    reader.readAsDataURL(file);
    // Note: AI tags come back from server after upload with Computer Vision
    document.getElementById('ai-tags').innerHTML='<span class="tag-note">Tags will be generated on upload via Azure Computer Vision…</span>';
  }

  async function upload(){
    if(!selectedFile) return toast('Select a photo first','err');
    const title=document.getElementById('f-title').value.trim();
    if(!title) return toast('Title is required','err');

    const btn=document.getElementById('uploadBtn');
    btn.disabled=true; btn.textContent='Uploading…';

    const fd=new FormData();
    fd.append('image', selectedFile);
    fd.append('title', title);
    fd.append('caption', document.getElementById('f-caption').value);
    fd.append('location', document.getElementById('f-location').value);
    fd.append('people', document.getElementById('f-people').value);
    fd.append('tags', JSON.stringify(aiTags));

    try{
      const res=await fetch(`${API}/photos/upload`,{
        method:'POST', headers:{'Authorization':`Bearer ${token}`}, body:fd
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.detail||'Upload failed');
      toast('Photo published! 🎉');
      // Reset
      selectedFile=null;
      document.getElementById('preview').style.display='none';
      ['f-title','f-caption','f-location','f-people'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('ai-tags').innerHTML='<span class="tag-note">Upload an image to generate tags…</span>';
      loadPhotos();
    } catch(e){ toast(e.message,'err'); }
    finally{ btn.disabled=false; btn.textContent='Publish Photo'; }
  }

  async function loadPhotos(){
    const grid=document.getElementById('grid');
    try{
      const res=await fetch(`${API}/photos/?creator_only=true`,{headers:{'Authorization':`Bearer ${token}`}});
      const data=await res.json();
      document.getElementById('count').textContent=`${data.length} photo${data.length!==1?'s':''}`;
      if(!data.length){
        grid.innerHTML='<div class="empty"><div class="icon">🖼️</div><p>No photos yet.<br>Upload your first!</p></div>';
        return;
      }
      grid.innerHTML=data.map(p=>`
        <div class="photo-card">
          <img src="${p.image_url}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'"/>
          <div class="card-info">
            <div class="card-title">${p.title}</div>
            <div class="card-meta">📍 ${p.location||'No location'}</div>
            <div class="card-stats">
              <span>⭐ ${(p.avg_rating||0).toFixed(1)}</span>
              <span>💬 ${p.comment_count||0}</span>
            </div>
          </div>
        </div>`).join('');
    }catch(e){ grid.innerHTML='<div class="empty"><div class="icon">⚠️</div><p>Could not load photos</p></div>'; }
  }

  loadPhotos();
</script>
</body>
</html>
